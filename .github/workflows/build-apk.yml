name: Build APK

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev \
            libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-android-armeabi,i686-linux-android,x86_64-linux-android
          components: clippy

      - name: Check
        run: cargo check --lib --manifest-path src-tauri/Cargo.toml

      - name: Test
        run: cargo test --lib --manifest-path src-tauri/Cargo.toml

      - name: Clippy
        run: cargo clippy --lib --manifest-path src-tauri/Cargo.toml -- -D warnings

  build-android:
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev \
            libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-android-armeabi,i686-linux-android,x86_64-linux-android
          components: clippy

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          yes | sdkmanager "ndk;27.0.12077973"
          yes | sdkmanager --uninstall "ndk;29.0.14206865" || true
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Bump version from tag
        if: github.event_name == 'release'
        run: |
          bash ./scripts/bump-version.sh

      - name: Decode keystore
        if: github.event_name == 'release'
        run: |
          echo "${{ secrets.OPEN_GRIND_KEYSTORE_BASE64 }}" | base64 -d > open-grind.keystore
          echo "OPEN_GRIND_KEYSTORE_PATH=$(pwd)/open-grind.keystore" >> $GITHUB_ENV
          echo "OPEN_GRIND_KEYSTORE_PASSWORD=${{ secrets.OPEN_GRIND_KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "OPEN_GRIND_KEYSTORE_ALIAS=${{ secrets.OPEN_GRIND_KEYSTORE_ALIAS }}" >> $GITHUB_ENV

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend
        run: bun run build

      - name: Build APK
        run: bun run tauri android build --apk
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          NDK_HOME: ${{ env.NDK_HOME }}

      - name: Sign APK
        if: env.OPEN_GRIND_KEYSTORE_PATH != ''
        run: |
          APK_PATH=$(find src-tauri/gen/android/app/build/outputs/apk -name "*.apk" -type f | head -1)
          echo "Signing $APK_PATH"
          apksigner sign \
            --ks "${OPEN_GRIND_KEYSTORE_PATH}" \
            --ks-pass "pass:${OPEN_GRIND_KEYSTORE_PASSWORD}" \
            --key-pass "pass:${OPEN_GRIND_KEYSTORE_PASSWORD}" \
            --ks-key-alias "${OPEN_GRIND_KEYSTORE_ALIAS:-open-grind}" \
            --v4-signing-enabled false \
            "$APK_PATH"
          apksigner verify --verbose "$APK_PATH"

      - name: Upload APK to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/gen/android/app/build/outputs/apk/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK as artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: open-grind-apk
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          retention-days: 30